<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAI SAKURAJIMA | 3D 高级官网</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

html {
  scroll-behavior: smooth;
  background: #0c0a16;
  color: white;
}

/* 导航栏 */
.nav {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 18px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  text-align: center;
  font-size: 17px;
  z-index: 999;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* 全屏区域 */
.section {
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 20px;
  opacity: 0;
  transform: translateY(50px);
  transition: 1.1s cubic-bezier(0.16, 1, 0.3, 1);
}

.section.show {
  opacity: 1;
  transform: translateY(0);
}

/* 3D 卡片核心 */
.card-3d {
  width: 320px;
  height: 480px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.5s ease;
}

.card-3d img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 24px;
  box-shadow: 0 30px 80px rgba(130, 80, 255, 0.3);
  position: absolute;
  backface-visibility: hidden;
}

/* 鼠标 3D 效果 */
.wrap {
  perspective: 1000px;
  cursor: pointer;
}

/* 文字 */
.title {
  font-size: 48px;
  font-weight: 700;
  margin-bottom: 10px;
  background: linear-gradient(90deg, #a88cff, #ff9ed2);
  -webkit-background-clip: text;
  color: transparent;
}

.sub {
  font-size: 20px;
  color: #aaa;
  margin-bottom: 40px;
}

/* 高级按钮 */
.btn {
  padding: 14px 32px;
  border-radius: 50px;
  border: none;
  background: linear-gradient(90deg, #7f5af0, #ff57a2);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
  margin-top: 30px;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 30px rgba(127, 90, 240, 0.4);
}

/* 浮动动画 */
@keyframes float {
  0%{ transform: translateY(0px); }
  50%{ transform: translateY(-12px); }
  100%{ transform: translateY(0px); }
}

.float {
  animation: float 4s infinite ease-in-out;
}
</style>
</head>

<body>

<div class="nav">MAI SAKURAJIMA 樱岛麻衣</div>

<!-- 3D 主屏幕 -->
<section class="section">
  <div class="title">樱岛麻衣</div>
  <div class="sub">Sakurajima Mai | 3D 高级官网</div>

  <div class="wrap">
    <div class="card-3d float">
      <img src="https://picsum.photos/600/900" alt="麻衣">
    </div>
  </div>

  <button class="btn">进入世界</button>
</section>

<!-- 第二屏 -->
<section class="section">
  <div class="title">她的光芒</div>
  <div class="sub">国民级演员 · 冷静与温柔并存</div>
  <button class="btn">经典台词</button>
</section>

<!-- 第三屏 -->
<section class="section">
  <div class="title">永远的麻衣学姐</div>
  <div class="sub">你是我生命中最耀眼的光</div>
  <button class="btn">收藏页面</button>
</section>

<script>
// 3D 鼠标跟随
const card = document.querySelector('.card-3d');
document.addEventListener('mousemove', (e) => {
  let x = (window.innerWidth / 2 - e.pageX) / 25;
  let y = (window.innerHeight / 2 - e.pageY) / 25;
  card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

// 滚动渐入动画
const sections = document.querySelectorAll('.section');
const ob = new IntersectionObserver(obs => {
  obs.forEach(o => {
    if (o.isIntersecting) o.target.classList.add('show');
  });
}, { threshold: 0.3 });
sections.forEach(s => ob.observe(s));
</script>

</body>
</html>
