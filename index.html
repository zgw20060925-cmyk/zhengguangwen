<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>樱岛麻衣 | 苹果风官网</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

html {
  scroll-behavior: smooth; /* 苹果丝滑滚动 */
}

/* 导航栏 */
.nav {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(0,0,0,0.8);
  color: white;
  text-align: center;
  padding: 14px 0;
  font-size: 18px;
  z-index: 999;
  backdrop-filter: blur(10px);
}

/* 苹果风全屏板块 */
.section {
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
  opacity: 0;
  transform: translateY(40px);
  transition: 0.9s cubic-bezier(0.16, 1, 0.3, 1);
}

.section.show {
  opacity: 1;
  transform: translateY(0);
}

/* 背景 */
.bg1 { background: #fff; }
.bg2 { background: #f8f8f8; }
.bg3 { background: #000; color: white; }

/* 苹果风大标题 */
.title {
  font-size: 52px;
  font-weight: 700;
  margin-bottom: 10px;
}

.subtitle {
  font-size: 24px;
  color: #666;
  margin-bottom: 30px;
}

.bg3 .subtitle {
  color: #aaa;
}

/* 图片 */
.img {
  max-width: 340px;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  transition: 0.5s;
}

.img:hover {
  transform: scale(1.03);
}

/* 苹果按钮 */
.btn {
  padding: 12px 26px;
  background: #007aff;
  color: white;
  border-radius: 30px;
  font-size: 16px;
  border: none;
  cursor: pointer;
  transition: 0.3s;
  margin-bottom: 20px;
}

.btn:hover {
  background: #0082ff;
  transform: scale(1.04);
}

</style>
</head>

<body>

<div class="nav">樱岛麻衣 | 麻衣学姐</div>

<!-- 第一屏 -->
<section class="section bg1">
  <div class="title">樱岛麻衣</div>
  <div class="subtitle">青春猪头少年不会梦到兔女郎学姐</div>
  <button class="btn">了解角色</button>
  <img class="img" src="https://picsum.photos/600/900" alt="麻衣">
</section>

<!-- 第二屏 -->
<section class="section bg2">
  <div class="title">她的温柔</div>
  <div class="subtitle">外表冷静，内心温柔</div>
  <button class="btn">经典台词</button>
  <img class="img" src="https://picsum.photos/600/901" alt="麻衣">
</section>

<!-- 第三屏 -->
<section class="section bg3">
  <div class="title">她的光芒</div>
  <div class="subtitle">国民级女演员，万人瞩目</div>
  <button class="btn">查看图集</button>
  <img class="img" src="https://picsum.photos/600/902" alt="麻衣">
</section>

<script>
// 滚动动画（苹果官网效果）
const sections = document.querySelectorAll('.section');
const observer = new IntersectionObserver(obs => {
  obs.forEach(o => {
    if (o.isIntersecting) o.target.classList.add('show');
  });
}, { threshold: 0.2 });

sections.forEach(s => observer.observe(s));
</script>

</body>
</html>
